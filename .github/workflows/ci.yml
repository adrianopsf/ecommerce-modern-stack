name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    name: Lint & Test DAGs
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: olist_dw_test
          POSTGRES_USER: olist_user
          POSTGRES_PASSWORD: olist_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_DB: olist_dw_test
      POSTGRES_USER: olist_user
      POSTGRES_PASSWORD: olist_pass
      AIRFLOW__CORE__UNIT_TEST_MODE: "true"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://olist_user:olist_pass@localhost/olist_dw_test"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check airflow/ scripts/

      - name: Initialise Airflow DB
        env:
          PYTHONPATH: ${{ github.workspace }}/airflow
          AIRFLOW_HOME: ${{ github.workspace }}/airflow
        run: airflow db init

      - name: Test DAGs
        env:
          PYTHONPATH: ${{ github.workspace }}/airflow
          AIRFLOW_HOME: ${{ github.workspace }}/airflow
        run: pytest airflow/tests/ -v --tb=short

  dbt-compile:
    name: dbt Compile
    runs-on: ubuntu-latest
    needs: lint-and-test

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: olist_dw_test
          POSTGRES_USER: olist_user
          POSTGRES_PASSWORD: olist_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_HOST: localhost
      POSTGRES_USER: olist_user
      POSTGRES_PASSWORD: olist_pass
      POSTGRES_DB: olist_dw_test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt
        run: pip install dbt-postgres==1.7.0

      - name: Copy profiles
        run: |
          mkdir -p ~/.dbt
          cp dbt/olist_dw/profiles.yml ~/.dbt/profiles.yml

      - name: dbt deps
        run: dbt deps --project-dir dbt/olist_dw

      - name: dbt compile
        run: dbt compile --project-dir dbt/olist_dw --profiles-dir dbt/olist_dw
