version: 2

sources:
  - name: olist_raw
    description: "Raw Olist Brazilian E-Commerce data loaded from CSVs into PostgreSQL raw schema."
    schema: raw
    tables:
      - name: olist_orders_dataset
        description: "All orders placed on the Olist marketplace."
        columns:
          - name: order_id
            description: "Unique order identifier."
            tests:
              - unique
              - not_null
          - name: customer_id
            tests:
              - not_null

      - name: olist_customers_dataset
        description: "Customer account records."
        columns:
          - name: customer_id
            description: "Unique customer identifier (per order)."
            tests:
              - unique
              - not_null
          - name: customer_unique_id
            tests:
              - not_null

      - name: olist_order_items_dataset
        description: "Individual line items for each order."
        columns:
          - name: order_id
            tests:
              - not_null
          - name: order_item_id
            tests:
              - not_null

      - name: olist_products_dataset
        description: "Product catalog."
        columns:
          - name: product_id
            tests:
              - unique
              - not_null

      - name: olist_sellers_dataset
        description: "Seller accounts on the marketplace."
        columns:
          - name: seller_id
            tests:
              - unique
              - not_null

      - name: olist_order_payments_dataset
        description: "Payment records, one row per payment method per order."
        columns:
          - name: order_id
            tests:
              - not_null

      - name: olist_order_reviews_dataset
        description: "Customer reviews per order."
        columns:
          - name: order_id
            tests:
              - not_null

      - name: product_category_name_translation
        description: "Portuguese-to-English translation of product category names."
        columns:
          - name: product_category_name
            tests:
              - not_null
