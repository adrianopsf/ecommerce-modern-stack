version: 2

sources:
  - name: raw
    description: "Raw Olist data loaded from CSVs into PostgreSQL raw schema."
    schema: raw
    tables:
      - name: orders
        description: "All orders placed on Olist platform."
        columns:
          - name: order_id
            description: "Unique order identifier."
            tests:
              - unique
              - not_null
          - name: customer_id
            tests:
              - not_null

      - name: customers
        description: "Customer accounts."
        columns:
          - name: customer_id
            tests:
              - unique
              - not_null

      - name: order_items
        description: "Individual line items per order."
        columns:
          - name: order_id
            tests:
              - not_null
          - name: order_item_id
            tests:
              - not_null

      - name: products
        description: "Product catalog."
        columns:
          - name: product_id
            tests:
              - unique
              - not_null

      - name: order_payments
        description: "Payment records per order."
        columns:
          - name: order_id
            tests:
              - not_null

      - name: sellers
        description: "Seller accounts."
        columns:
          - name: seller_id
            tests:
              - unique
              - not_null
