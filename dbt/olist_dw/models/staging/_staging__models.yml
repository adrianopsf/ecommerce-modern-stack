version: 2

models:
  - name: stg_orders
    description: "Cleaned orders with properly typed dates and status."
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
      - name: order_status
        tests:
          - not_null
          - accepted_values:
              values: ['delivered', 'shipped', 'processing', 'canceled', 'invoiced', 'approved', 'created', 'unavailable']

  - name: stg_customers
    description: "Customer data with geolocation info."
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null

  - name: stg_order_items
    description: "Order line items with prices in BRL."
    columns:
      - name: order_id
        tests:
          - not_null
      - name: price
        tests:
          - not_null

  - name: stg_products
    description: "Products with translated category names."
    columns:
      - name: product_id
        tests:
          - unique
          - not_null

  - name: stg_order_payments
    description: "Payment breakdown per order."
    columns:
      - name: order_id
        tests:
          - not_null
      - name: payment_value
        tests:
          - not_null

  - name: stg_sellers
    description: "Sellers with state information."
    columns:
      - name: seller_id
        tests:
          - unique
          - not_null
