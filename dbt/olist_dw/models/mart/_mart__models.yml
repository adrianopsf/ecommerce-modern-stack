version: 2

models:
  - name: mart_orders
    description: "Full order view with customer info, payment, items and delivery metrics."
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: total_payment_value
        tests:
          - not_null
      - name: order_status
        tests:
          - not_null
          - accepted_values:
              values: ['delivered', 'shipped', 'processing', 'canceled', 'invoiced', 'approved', 'created', 'unavailable']

  - name: mart_customers
    description: "Customer profile with lifetime value and order frequency segments."
    columns:
      - name: customer_unique_id
        tests:
          - unique
          - not_null
      - name: order_frequency_segment
        tests:
          - accepted_values:
              values: ['high', 'medium', 'low']
      - name: customer_value_segment
        tests:
          - accepted_values:
              values: ['high_value', 'mid_value', 'low_value']

  - name: mart_products
    description: "Product catalog enriched with sales performance metrics."
    columns:
      - name: product_id
        tests:
          - unique
          - not_null

  - name: mart_monthly_sales
    description: "Monthly aggregated sales metrics per order status."
    columns:
      - name: sale_month
        tests:
          - not_null
      - name: order_status
        tests:
          - not_null
      - name: gross_revenue
        tests:
          - not_null
